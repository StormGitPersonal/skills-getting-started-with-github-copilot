<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 120" width="200" height="120" aria-labelledby="title desc" role="img">
  <title id="title">Merginton Croissant Logo</title>
  <desc id="desc">A stylized croissant wearing a small hat and holding a cigar.</desc>
  <!-- Croissant base -->
  <g transform="translate(10,10)">
    <path d="M30 60 C10 30, 70 10, 110 30 C140 45, 160 40, 170 50 C150 70, 120 80, 80 80 C50 80, 40 75, 30 60 Z"
          fill="#F4B56A" stroke="#D99145" stroke-width="3"/>
    <!-- inner layers for flaky effect -->
    <path d="M40 58 C28 42, 60 32, 95 40" fill="none" stroke="#E8A95A" stroke-width="3" stroke-linecap="round"/>
    <path d="M60 65 C70 55, 90 50, 120 55" fill="none" stroke="#E8A95A" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Hat: small bowler on top -->
  <g transform="translate(70,2)">
    <ellipse cx="30" cy="18" rx="30" ry="10" fill="#111" />
    <path d="M5 18 C15 6, 45 6, 55 18 L55 22 C45 12, 15 12, 5 22 Z" fill="#111" />
    <rect x="18" y="20" width="24" height="6" rx="2" fill="#222" />
  </g>

  <!-- Cigar on the right -->
  <g transform="translate(130,60)">
    <rect x="0" y="0" width="36" height="10" rx="4" fill="#6b4226" stroke="#5a361f" stroke-width="1" />
    <rect x="30" y="0" width="6" height="10" rx="3" fill="#c75a3a" />
    <!-- ember -->
    <circle cx="33" cy="5" r="1.6" fill="#ff6b6b" />
    <!-- small smoke curl -->
    <path d="M36 -4 C38 -8, 34 -12, 36 -16" fill="none" stroke="#bbb" stroke-width="1" stroke-linecap="round" opacity="0.9"/>
  </g>
  
</svg>
